<!doctype html>
<html>
  <head>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      ::-webkit-scrollbar { display: none; }
      body {
        background: transparent;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        pointer-events: none;
      }
      .toast-container {
        position: absolute;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 20px;
      }
      .toast-container.pos-top-right { top: 0; left: 0; right: 0; align-items: flex-end; }
      .toast-container.pos-top-left { top: 0; left: 0; right: 0; align-items: flex-start; }
      .toast-container.pos-bottom-right { bottom: 0; left: 0; right: 0; flex-direction: column-reverse; align-items: flex-end; }
      .toast-container.pos-bottom-left { bottom: 0; left: 0; right: 0; flex-direction: column-reverse; align-items: flex-start; }

      .toast {
        pointer-events: auto;
        width: 380px;
        background: rgba(25, 25, 30, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        cursor: default;
        transform: translateX(0);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Slide animations */
      .toast.slide-right-enter { transform: translateX(420px); opacity: 0; }
      .toast.slide-left-enter { transform: translateX(-420px); opacity: 0; }
      .toast.slide-up-enter { transform: translateY(-100px); opacity: 0; }
      .toast.slide-down-enter { transform: translateY(100px); opacity: 0; }
      .toast.fade-enter { opacity: 0; }
      .toast.visible { transform: translateX(0) translateY(0); opacity: 1; }
      .toast.dismissing { opacity: 0; transform: scale(0.95); transition: all 0.2s ease-in; }

      .toast-accent {
        height: 3px;
        width: 100%;
      }
      .toast-content {
        padding: 14px 16px 10px;
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      .toast-icon {
        font-size: 28px;
        line-height: 1;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .toast-body {
        flex: 1;
        min-width: 0;
      }
      .toast-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 4px;
      }
      .toast-title {
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        line-height: 1.3;
      }
      .toast-close {
        color: rgba(255, 255, 255, 0.4);
        font-size: 18px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
        flex-shrink: 0;
        pointer-events: auto;
        transition: color 0.15s;
      }
      .toast-close:hover { color: rgba(255, 255, 255, 0.8); }
      .toast-close { touch-action: manipulation; }
      .toast-message {
        color: rgba(255, 255, 255, 0.7);
        font-size: 13px;
        line-height: 1.4;
      }
      .toast-actions {
        display: flex;
        gap: 8px;
        padding: 8px 16px 14px;
        flex-wrap: wrap;
      }
      .toast-action-btn {
        flex: 1;
        min-width: 0;
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        pointer-events: auto;
        transition: filter 0.15s, transform 0.1s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        touch-action: manipulation;
      }
      .toast-action-btn:active {
        transform: scale(0.96);
        filter: brightness(0.85);
      }
      .toast-action-btn.primary {
        background: rgba(74, 144, 226, 0.9);
      }
      .toast-action-btn.secondary {
        background: rgba(80, 80, 90, 0.8);
      }
      .toast-timer {
        height: 3px;
        background: rgba(255, 255, 255, 0.15);
        transition: width linear;
      }
    </style>
  </head>
  <body>
    <div class="toast-container pos-top-right" id="toastContainer"></div>

    <script>
      // IPC bridge — works with both contextIsolation (preload) and nodeIntegration
      const api = window.notificationAPI || (() => {
        const { ipcRenderer } = require("electron");
        return {
          onShow: (cb) => ipcRenderer.on("notification-show", (e, data) => cb(data)),
          onDismiss: (cb) => ipcRenderer.on("notification-dismiss", (e, data) => cb(data)),
          onSettings: (cb) => ipcRenderer.on("notification-settings", (e, s) => cb(s)),
          sendViewState: (data) => ipcRenderer.send("notification-view-state", data),
          sendAction: (data) => ipcRenderer.send("notification-action", data),
        };
      })();

      const toasts = new Map();
      let position = 'top-right';
      let animation = 'slide-right';
      let maxVisible = 3;

      const container = document.getElementById('toastContainer');

      // Sanitize strings to prevent XSS when inserting into DOM
      function sanitizeText(str) {
        if (str == null) return '';
        const div = document.createElement('div');
        div.textContent = String(str);
        return div.innerHTML;
      }

      // Validate and sanitize CSS color values
      function sanitizeColor(color) {
        if (!color || typeof color !== 'string') return '#4A90E2';
        // Allow hex, rgb, rgba, hsl, hsla, and named colors only
        if (/^(#[0-9a-fA-F]{3,8}|rgba?\([^)]+\)|hsla?\([^)]+\)|[a-zA-Z]{1,20})$/.test(color.trim())) {
          return color.trim();
        }
        return '#4A90E2';
      }

      function updatePosition() {
        container.className = `toast-container pos-${position}`;
      }

      function createToast(data) {
        // Validate data is an object
        if (!data || typeof data !== 'object') return;

        const id = String(data.id || Date.now());

        // Remove existing toast with same ID (update)
        if (toasts.has(id)) {
          dismissToast(id, true);
        }

        // Enforce max visible
        while (toasts.size >= maxVisible) {
          const oldest = toasts.keys().next().value;
          dismissToast(oldest, true);
        }

        const color = sanitizeColor(data.color);
        const safeTitle = sanitizeText(data.title) || 'Notification';
        const safeMessage = sanitizeText(data.message);
        const safeIcon = sanitizeText(data.icon) || '&#x1F514;';
        const safeId = sanitizeText(id);
        const timeout = typeof data.timeout === 'number' ? data.timeout : parseFloat(data.timeout);

        const el = document.createElement('div');
        el.className = `toast ${animation}-enter`;
        el.setAttribute('data-id', safeId);

        let actionsHtml = '';
        if (Array.isArray(data.actions) && data.actions.length > 0) {
          actionsHtml = '<div class="toast-actions">' +
            data.actions.filter(a => a && typeof a === 'object').map((a, i) =>
              `<button class="toast-action-btn ${i === 0 ? 'primary' : 'secondary'}" data-action="${sanitizeText(a.action)}" style="${i === 0 ? 'background:' + color : ''}">${sanitizeText(a.label)}</button>`
            ).join('') +
          '</div>';
        }

        let timerHtml = '';
        if (timeout > 0 && isFinite(timeout)) {
          timerHtml = `<div class="toast-timer" id="timer-${safeId}" style="width:100%"></div>`;
        }

        el.innerHTML =
          `<div class="toast-accent" style="background:${color}"></div>` +
          `<div class="toast-content">` +
            `<div class="toast-icon">${safeIcon}</div>` +
            `<div class="toast-body">` +
              `<div class="toast-header">` +
                `<div class="toast-title">${safeTitle}</div>` +
                `<div class="toast-close" data-dismiss="${safeId}">&#x2715;</div>` +
              `</div>` +
              `<div class="toast-message">${safeMessage}</div>` +
            `</div>` +
          `</div>` +
          actionsHtml +
          timerHtml;

        container.appendChild(el);

        // Animate in
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            el.classList.remove(`${animation}-enter`);
            el.classList.add('visible');
          });
        });

        // Close button
        el.querySelector('.toast-close').addEventListener('click', (e) => {
          e.stopPropagation();
          dismissToast(id);
        });

        // Action buttons
        el.querySelectorAll('.toast-action-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const action = btn.getAttribute('data-action');
            api.sendAction({ id, action });
            dismissToast(id);
          });
        });

        // Auto-dismiss timer
        let timer = null;
        if (timeout > 0 && isFinite(timeout)) {
          const timerBar = el.querySelector('.toast-timer');
          if (timerBar) {
            timerBar.style.transition = `width ${timeout * 1000}ms linear`;
            requestAnimationFrame(() => { timerBar.style.width = '0%'; });
          }
          timer = setTimeout(() => dismissToast(id), timeout * 1000);
        }

        toasts.set(id, { el, timer, data });

        // Tell main process to resize view to fit toasts (wait for layout + animation)
        setTimeout(() => updateViewBounds(), 350);
      }

      function dismissToast(id, instant = false) {
        const toast = toasts.get(id);
        if (!toast) return;

        if (toast.timer) clearTimeout(toast.timer);

        if (instant) {
          toast.el.remove();
        } else {
          toast.el.classList.add('dismissing');
          setTimeout(() => toast.el.remove(), 200);
        }

        toasts.delete(id);

        // Update view bounds or hide if empty (wait for dismiss animation)
        setTimeout(() => updateViewBounds(), 300);
      }

      function dismissAll() {
        for (const [id] of toasts) {
          dismissToast(id, true);
        }
      }

      // IPC handlers via preload bridge
      api.onShow((data) => {
        createToast(data);
      });

      api.onDismiss((data) => {
        if (data === 'all' || (data && data.id === 'all')) {
          dismissAll();
        } else if (data && data.id) {
          dismissToast(data.id);
        }
      });

      api.onSettings((settings) => {
        if (settings.position) { position = settings.position; updatePosition(); }
        if (settings.animation) { animation = settings.animation; }
        if (settings.maxVisible) { maxVisible = settings.maxVisible; }
      });

      function updateViewBounds() {
        if (toasts.size === 0) {
          api.sendViewState({ visible: false });
          return;
        }
        // Use scrollHeight to get full content height including overflow
        const height = container.scrollHeight + 10;
        api.sendViewState({ visible: true, height: height });
      }

      // Prevent mousedown from propagating (don't steal focus from other views)
      document.addEventListener('mousedown', (e) => {
        if (e.target.closest('.toast')) {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
